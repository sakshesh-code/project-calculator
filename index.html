<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakshesh's Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <div class="text"></div>
            </div>
            <div class="buttons">
                <div id="backspc" class="btn top">⌫</div>
                <div id="clear" class="btn top">AC</div>
                <div class="btn top op">%</div>
                <div class="btn right op">÷</div>
                <div class="btn num">7</div>
                <div class="btn num">8</div>
                <div class="btn num">9</div>
                <div class="btn right op">×</div>
                <div class="btn num">4</div>
                <div class="btn num">5</div>
                <div class="btn num">6</div>
                <div class="btn right op">-</div>
                <div class="btn num">1</div>
                <div class="btn num">2</div>
                <div class="btn num">3</div>
                <div class="btn right op">+</div>
                <div class="btn"></div>
                <div class="btn num">0</div>
                <div class="btn period">.</div>
                <div class="btn right result">=</div>
            </div>
        </div>
    </div>
</body>
</html>
